services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      - ./lavalink/plugins:/opt/Lavalink/plugins
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header=\"Authorization: $${LAVALINK_PASSWORD}\" http://localhost:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - bot-network

  bot:
    build: .
    container_name: discord-bot
    restart: unless-stopped
    depends_on:
      lavalink:
        condition: service_healthy
      mongodb:
        condition: service_started
    env_file: .env
    environment:
      # When running in Docker, use service names instead of localhost
      LAVALINK_HOST: lavalink
      LAVALINK_PORT: 2333
      MONGODB_URL: mongodb://mongodb:27017/discordbot
      INTERNAL_API_PORT: 4000
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4000/internal/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dashboard:
    build: ./dashboard
    container_name: discord-dashboard
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/discordbot
      BOT_INTERNAL_URL: http://bot:4000
    ports:
      - "3000:3000"
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  bot-network:
    driver: bridge

volumes:
  mongo_data: